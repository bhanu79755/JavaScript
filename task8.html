<!-- write an html page that combines text formatting:one word bold,italic,underlined small ,highlighted, deleted, and inserted-all in one sentence. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
 </head>
 <body>
  <p>This is a <b>bold</b> word, an <i>italic</i> word, an <u>underlined</u> word, a <small>small</small> word, a <mark>highlighted</mark> word, a <del>deleted</del> word, and an <ins>inserted</ins> word in one sentence.</p>
 </body>
 </html>
