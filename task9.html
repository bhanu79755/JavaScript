<!-- create an html page that explains html comments with an example- write comments before headings and paragraphs -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
 </head>
 <body>
  <!-- This is an HTML comment -->
  <h1>This is a heading</h1>
  <!-- Another comment before a paragraph -->
  <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur ex, eius obcaecati officiis, harum molestiae incidunt quisquam exercitationem provident nesciunt ipsam sequi. Recusandae dicta sit quaerat cum mollitia quae repellendus.</p>
 </body>
 </html>
